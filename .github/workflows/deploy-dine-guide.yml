name: Deploy Dine Guide

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-dine-guide
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy Cloudflare Worker
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build worker bundle
        run: npm run deploy:worker:build

      - name: Verify worker preview
        run: npm run test:production-preview

      - name: Deploy to Cloudflare
        run: >
          npx --yes wrangler@latest deploy cloudflare/michelin-worker/worker.mjs
          --name zjz-world-dine-guide
          --route 'restaurant.zjz.world/michelin*'
          --route 'restaurant.zjz.world/black-pearl*'
